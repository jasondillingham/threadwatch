name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/threadwatch

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test ./... -race -count=1

      - name: helm setup
        uses: azure/setup-helm@v4.3.1
        with:
          version: v3.18.4
        env:
          # azure/setup-helm currently advertises Node 20; opt into the
          # Node 24 runtime that becomes mandatory mid-June 2026.
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

      - run: helm lint charts/threadwatch

      - name: helm template (sanity)
        run: helm template threadwatch charts/threadwatch > /dev/null

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v5

      - name: short sha
        id: sha
        run: echo "short=$(echo ${{ github.sha }} | cut -c1-7)" >> "$GITHUB_OUTPUT"

      - name: build date
        id: date
        run: echo "ts=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          provenance: false
          build-args: |
            VERSION=main
            COMMIT=${{ steps.sha.outputs.short }}
            BUILD_DATE=${{ steps.date.outputs.ts }}
          tags: |
            ${{ env.IMAGE }}:main
            ${{ env.IMAGE }}:sha-${{ steps.sha.outputs.short }}
