# Default values for threadwatch.
# This is a YAML-formatted file. See README.md for a guide to overriding.

image:
  repository: ghcr.io/jasondillingham/threadwatch
  # Defaults to .Chart.AppVersion when empty.
  tag: ""
  pullPolicy: IfNotPresent

# RWO PVC; deployment strategy is Recreate.
replicaCount: 1

# Resources tuned for the "watch a handful of threads" workload.
resources:
  requests:
    cpu: 25m
    memory: 32Mi
  limits:
    cpu: 200m
    memory: 128Mi

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

# NPM-fronted homelab is the default deployment topology, so chart-side
# Ingress is off by default. Override values-traefik.yaml for the
# Traefik + cert-manager alternative.
ingress:
  enabled: false
  className: ""
  host: threadwatch.local
  annotations: {}
  tls:
    enabled: false
    secretName: ""

# /data PVC for SQLite (used in Checkpoint B).
persistence:
  enabled: true
  storageClass: ""
  size: 1Gi
  accessModes:
    - ReadWriteOnce
  existingClaim: ""

probes:
  enabled: true
  liveness:
    path: /healthz
    initialDelaySeconds: 5
    periodSeconds: 30
  readiness:
    path: /readyz
    initialDelaySeconds: 5
    periodSeconds: 10

containerSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false
  capabilities:
    drop: [ALL]

podSecurityContext:
  fsGroup: 65532

nodeSelector: {}
tolerations: []
affinity: {}

# Logging.
log:
  level: info
  format: json

# Application configuration. Rendered into a ConfigMap and mounted at
# /etc/threadwatch/threads.yaml.
config:
  pollInterval: 15m
  # Each entry becomes one watched thread. Polling is per-thread.
  threads:
    - label: "Tailscale: kube/certs LE backoff"
      owner: tailscale
      repo: tailscale
      number: 19938
    - label: "Tailscale: Ingress label overflow"
      owner: tailscale
      repo: tailscale
      number: 19404
    - label: "cert-manager: DNS01 throttling"
      owner: cert-manager
      repo: cert-manager
      number: 8776
    - label: "Crossplane: RBAC timeout misclassification"
      owner: crossplane
      repo: crossplane
      number: 7398
