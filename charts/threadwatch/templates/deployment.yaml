apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "threadwatch.fullname" . }}
  labels:
    {{- include "threadwatch.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  strategy:
    {{- if .Values.persistence.enabled }}
    # RWO PVC: must terminate the old pod before scheduling the new one.
    type: Recreate
    {{- else }}
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
    {{- end }}
  selector:
    matchLabels:
      {{- include "threadwatch.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "threadwatch.selectorLabels" . | nindent 8 }}
    spec:
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: threadwatch
          image: {{ include "threadwatch.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: LISTEN_ADDR
              value: ":8080"
            - name: LOG_LEVEL
              value: {{ .Values.log.level | quote }}
            - name: LOG_FORMAT
              value: {{ .Values.log.format | quote }}
            - name: DATABASE_PATH
              value: "/data/threadwatch.db"
            - name: THREADS_CONFIG_PATH
              value: "/etc/threadwatch/threads.yaml"
            - name: POLL_INTERVAL
              value: {{ .Values.config.pollInterval | quote }}
          {{- if .Values.probes.enabled }}
          livenessProbe:
            httpGet:
              path: {{ .Values.probes.liveness.path }}
              port: http
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
          readinessProbe:
            httpGet:
              path: {{ .Values.probes.readiness.path }}
              port: http
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            {{- if .Values.persistence.enabled }}
            - name: data
              mountPath: /data
            {{- end }}
            - name: threads
              mountPath: /etc/threadwatch
              readOnly: true
      volumes:
        {{- if .Values.persistence.enabled }}
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "threadwatch.pvcName" . }}
        {{- end }}
        - name: threads
          configMap:
            name: {{ include "threadwatch.fullname" . }}-threads
            items:
              - key: threads.yaml
                path: threads.yaml
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
