{{define "base"}}<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{template "title" .}} · threadwatch</title>
    <link rel="stylesheet" href="/static/tailwind.css" />
  </head>
  <body class="min-h-screen bg-slate-50 text-slate-900 antialiased">
    <header class="border-b border-slate-200 bg-white">
      <div class="mx-auto flex max-w-5xl items-center justify-between px-6 py-4">
        <a href="/" class="text-lg font-semibold tracking-tight">threadwatch</a>
        <span class="text-xs text-slate-500">v{{.Version}}</span>
      </div>
    </header>
    <main class="mx-auto max-w-5xl px-6 py-8">
      {{template "content" .}}
    </main>
    <footer class="mx-auto max-w-5xl px-6 pb-8 pt-4 text-xs text-slate-500">
      <a href="https://github.com/jasondillingham/threadwatch" class="hover:underline">github.com/jasondillingham/threadwatch</a>
    </footer>
  </body>
</html>
{{end}}
